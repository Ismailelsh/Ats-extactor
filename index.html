<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart CV Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            max-width: 850px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #1a2a3a; font-size: 28px; }
        .sub { color: #666; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 16px; margin-bottom: 6px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dce3ec;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-primary {
            background: #2563eb; color: white; border: none;
            padding: 14px; border-radius: 12px; font-size: 18px;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 16px;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success {
            background: #16a34a; color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-success:hover { background: #15803d; }
        .btn-pdf {
            background: #8b5cf6; color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 10px; margin-left: 10px;
        }
        .btn-pdf:hover { background: #7c3aed; }
        .result-box {
            margin-top: 25px; padding: 20px;
            background: #f8fafc; border-radius: 16px;
            border: 2px solid #e2e8f0; display: none;
        }
        .result-box.show { display: block; }
        .flex-buttons {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .cv-output {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #dce3ec;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>📄 Smart CV Generator</h1>
    <p class="sub">Fill in your details and we'll generate a professional CV instantly.</p>

    <!-- Name -->
    <label>👤 Full Name:</label>
    <input type="text" id="fullName" placeholder="e.g., Ahmed Mohamed" />

    <!-- Email -->
    <label>📧 Email:</label>
    <input type="email" id="email" placeholder="ahmed@example.com" />

    <!-- Phone -->
    <label>📞 Phone:</label>
    <input type="text" id="phone" placeholder="+20 100 000 0000" />

    <!-- Address -->
    <label>📍 Address (optional):</label>
    <input type="text" id="address" placeholder="Cairo, Egypt" />

    <!-- Experience -->
    <label>💼 Experience (write your experience in detail):</label>
    <textarea id="experience" placeholder="e.g., 5 years as a Software Engineer at Google. Worked on Python, Django, AWS, and led a team of 5."></textarea>

    <!-- Skills -->
    <label>🛠️ Skills (comma separated):</label>
    <input type="text" id="skills" placeholder="e.g., Python, Django, AWS, PostgreSQL" />

    <!-- Education -->
    <label>🎓 Education:</label>
    <textarea id="education" placeholder="e.g., B.Sc. in Computer Science, Cairo University, 2018"></textarea>

    <!-- Button -->
    <button class="btn-primary" onclick="generateCV()">🚀 Generate CV</button>

    <!-- Result -->
    <div id="result" class="result-box">
        <h3>📄 Your Professional CV</h3>
        <div id="cvOutput" class="cv-output"></div>
        <div class="flex-buttons">
            <button class="btn-success" onclick="copyCV()">📋 Copy CV</button>
            <button class="btn-pdf" onclick="downloadPDF()">📄 Download as PDF</button>
        </div>
    </div>

</div>

<script>
    function generateCV() {
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const experience = document.getElementById('experience').value.trim();
        const skills = document.getElementById('skills').value.trim();
        const education = document.getElementById('education').value.trim();

        if (!name || !email || !phone || !experience || !skills || !education) {
            alert('⚠️ Please fill in all required fields (Name, Email, Phone, Experience, Skills, Education).');
            return;
        }

        const cv = `
==========================================
            📄 CURRICULUM VITAE
==========================================

👤 PERSONAL INFORMATION
───────────────────────
Name:        ${name}
Email:       ${email}
Phone:       ${phone}
${address ? `Address:     ${address}` : ''}

💼 PROFESSIONAL EXPERIENCE
───────────────────────
${experience}

🛠️ SKILLS
───────────────────────
${skills.split(',').map(s => '• ' + s.trim()).join('\n')}

🎓 EDUCATION
───────────────────────
${education}

==========================================
    `;

        document.getElementById('cvOutput').textContent = cv;
        document.getElementById('result').classList.add('show');
    }

    function copyCV() {
        const text = document.getElementById('cvOutput').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ CV copied to clipboard!');
        }).catch(() => {
            const range = document.createRange();
            range.selectNode(document.getElementById('cvOutput'));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('✅ CV copied to clipboard!');
        });
    }

    function downloadPDF() {
        const content = document.getElementById('cvOutput').textContent;
        if (!content) {
            alert('⚠️ Generate a CV first!');
            return;
        }

        const element = document.createElement('div');
        element.innerHTML = `<pre style="font-family: 'Courier New', monospace; white-space: pre-wrap; padding: 30px; font-size: 14px; line-height: 1.8; background: white; border-radius: 12px;">${content}</pre>`;
        document.body.appendChild(element);

        html2pdf().set({
            margin:       0.5,
            filename:     'CV_' + document.getElementById('fullName').value.trim().replace(/\s+/g, '_') + '.pdf',
            html2canvas:  { scale: 2, letterRendering: true },
            jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        }).from(element).save().then(() => {
            document.body.removeChild(element);
        });
    }
</script>
</body>
</html>
