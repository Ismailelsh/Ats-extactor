<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ATS Extractor + CV Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #1a2a3a; font-size: 28px; }
        .sub { color: #666; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 16px; margin-bottom: 6px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dce3ec;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-primary {
            background: #2563eb; color: white; border: none;
            padding: 14px; border-radius: 12px; font-size: 18px;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 16px;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success {
            background: #16a34a; color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-success:hover { background: #15803d; }
        .btn-pdf {
            background: #8b5cf6; color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 10px; margin-left: 10px;
        }
        .btn-pdf:hover { background: #7c3aed; }
        .result-box {
            margin-top: 25px; padding: 20px;
            background: #f8fafc; border-radius: 16px;
            border: 2px solid #e2e8f0; display: none;
        }
        .result-box.show { display: block; }
        .flex-buttons {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .cv-output {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #dce3ec;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-top: 10px;
            max-height: 600px;
            overflow-y: auto;
        }
        .keyword-badge {
            display: inline-block;
            background: #dbeafe;
            color: #1e40af;
            padding: 8px 16px;
            border-radius: 30px;
            margin: 5px 6px 5px 0;
            font-weight: bold;
            font-size: 15px;
        }
        .or-divider {
            text-align: center;
            margin: 10px 0;
            color: #999;
            font-weight: bold;
        }
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            color: #2563eb;
            font-weight: bold;
        }
        .loader.show { display: block; }
        .keywords-box {
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 12px;
            border: 1px solid #dce3ec;
            display: none;
        }
        .keywords-box.show { display: block; }
        .copy-area {
            margin-top: 15px;
            background: white;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #dce3ec;
        }
        .copy-area textarea {
            height: 60px;
            background: #f9fafb;
        }
        /* Print styles for PDF */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 20px; }
            .btn-primary, .btn-success, .btn-pdf, .flex-buttons, .copy-area, .keywords-box, .or-divider, hr, .loader, .sub { display: none !important; }
            .result-box { display: block !important; border: none; padding: 0; }
            .cv-output { max-height: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>
<div class="container">

    <h1>ATS Extractor + CV Generator</h1>
    <p class="sub">Paste a job description to extract keywords, then generate a professional CV.</p>

    <!-- ===== SECTION 1: KEYWORD EXTRACTOR ===== -->
    <label>Job URL (optional):</label>
    <input type="url" id="jobUrl" placeholder="https://www.linkedin.com/jobs/..." />

    <div class="or-divider">— OR —</div>

    <label>Paste job description text:</label>
    <textarea id="jobText" placeholder="Copy and paste the job description here..."></textarea>

    <button class="btn-primary" onclick="extractKeywords()">Extract Keywords</button>

    <div class="loader" id="loader">Fetching job data...</div>

    <!-- Keywords Result -->
    <div id="keywordsResult" class="keywords-box">
        <h3>Extracted Keywords (most frequent):</h3>
        <div id="keywordsList"></div>
        <div class="copy-area">
            <p>Copy this sentence to add to your CV:</p>
            <textarea id="readyText" rows="2" readonly></textarea>
            <button class="btn-success" onclick="copyText()">Copy Text</button>
        </div>
    </div>

    <hr style="margin: 30px 0; border: 1px solid #e2e8f0;">

    <!-- ===== SECTION 2: CV FORM ===== -->
    <h2>Fill in Your Details</h2>

    <label>Full Name:</label>
    <input type="text" id="fullName" placeholder="e.g., Ahmed Mohamed" />

    <label>Email:</label>
    <input type="email" id="email" placeholder="ahmed@example.com" />

    <label>Phone:</label>
    <input type="text" id="phone" placeholder="+20 100 000 0000" />

    <label>Address (optional):</label>
    <input type="text" id="address" placeholder="Cairo, Egypt" />

    <label>Experience:</label>
    <textarea id="experience" placeholder="e.g., 5 years as a Software Engineer at Google..."></textarea>

    <label>Skills (comma separated):</label>
    <input type="text" id="skills" placeholder="e.g., Python, Django, AWS" />

    <label>Education:</label>
    <textarea id="education" placeholder="e.g., B.Sc. in Computer Science, Cairo University"></textarea>

    <button class="btn-primary" onclick="generateProfessionalCV()" style="background: #16a34a;">Generate Professional CV</button>

    <!-- ===== CV RESULT ===== -->
    <div id="cvResult" class="result-box">
        <h3>Your Professional CV</h3>
        <div id="cvOutput" class="cv-output"></div>
        <div class="flex-buttons">
            <button class="btn-success" onclick="copyCV()">Copy CV</button>
            <button class="btn-pdf" onclick="downloadPDF()">Download as PDF</button>
        </div>
    </div>

</div>

<script>
    // ============================================
    // SECTION 1: KEYWORD EXTRACTOR
    // ============================================

    let extractedKeywords = [];

    async function extractKeywords() {
        const jobUrl = document.getElementById('jobUrl').value.trim();
        const jobText = document.getElementById('jobText').value.trim();
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('keywordsResult');

        if (jobUrl) {
            loader.classList.add('show');
            try {
                const text = await fetchJobText(jobUrl);
                if (text) {
                    processKeywords(text);
                    loader.classList.remove('show');
                    resultDiv.classList.add('show');
                    return;
                }
            } catch {
                alert('Could not fetch URL. Please paste text manually.');
                loader.classList.remove('show');
            }
        }

        if (jobText) {
            processKeywords(jobText);
            resultDiv.classList.add('show');
            return;
        }

        alert('Please paste a job description or enter a valid URL.');
    }

    async function fetchJobText(url) {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('Failed to fetch');
        const html = await response.text();
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        return tempDiv.textContent || tempDiv.innerText || '';
    }

    function processKeywords(text) {
        if (!text || text.length < 10) {
            alert('Text is too short. Please paste a complete job description.');
            return;
        }

        const words = text.toLowerCase().match(/[a-z\u0600-\u06FF]+/g) || [];
        const wordCount = {};
        words.forEach(word => {
            if (word.length > 2) wordCount[word] = (wordCount[word] || 0) + 1;
        });

        const sorted = Object.keys(wordCount).sort((a, b) => wordCount[b] - wordCount[a]);
        const stopWords = ['and', 'the', 'for', 'with', 'are', 'you', 'your', 'our', 'will', 'can',
                           'from', 'this', 'that', 'have', 'has', 'had', 'was', 'were', 'all', 'any',
                           'but', 'not', 'one', 'two', 'three', 'use', 'used', 'using'];
        const filtered = sorted.filter(word => !stopWords.includes(word));
        const topWords = filtered.slice(0, 15);

        extractedKeywords = topWords;

        if (topWords.length === 0) {
            alert('No meaningful keywords found.');
            return;
        }

        document.getElementById('keywordsList').innerHTML = topWords.map(word =>
            `<span class="keyword-badge">${word}</span>`
        ).join('');

        document.getElementById('readyText').value = `My key skills include: ${topWords.join(', ')}`;
    }

    function copyText() {
        const text = document.getElementById('readyText');
        text.select();
        navigator.clipboard.writeText(text.value).then(() => {
            alert('Copied!');
        }).catch(() => {
            document.execCommand('copy');
            alert('Copied!');
        });
    }

    // ============================================
    // SECTION 2: PROFESSIONAL CV GENERATOR
    // ============================================

    function generateProfessionalCV() {
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const experience = document.getElementById('experience').value.trim();
        const skills = document.getElementById('skills').value.trim();
        const education = document.getElementById('education').value.trim();

        if (!name || !email || !phone || !experience || !skills || !education) {
            alert('Please fill in all required fields.');
            return;
        }

        let keywords = [];
        if (extractedKeywords && extractedKeywords.length > 0) {
            keywords = extractedKeywords;
        } else {
            const allWords = skills.toLowerCase().match(/[a-z\u0600-\u06FF]+/g) || [];
            const wordCount = {};
            allWords.forEach(w => {
                if (w.length > 2) wordCount[w] = (wordCount[w] || 0) + 1;
            });
            keywords = Object.keys(wordCount).sort((a, b) => wordCount[b] - wordCount[a]).slice(0, 10);
        }

        const cv = `
CURRICULUM VITAE

PERSONAL INFORMATION
--------------------
Name        : ${name}
Email       : ${email}
Phone       : ${phone}
${address ? `Address     : ${address}` : ''}

PROFESSIONAL EXPERIENCE
-----------------------
${experience}

TECHNICAL SKILLS
----------------
${skills.split(',').map(s => '  * ' + s.trim()).join('\n')}

EDUCATION
---------
${education}

ADDITIONAL KEYWORDS
-------------------
${keywords.map(k => '  * ' + k).join('\n')}
        `;

        document.getElementById('cvOutput').textContent = cv;
        document.getElementById('cvResult').classList.add('show');
    }

    function copyCV() {
        const text = document.getElementById('cvOutput').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('CV copied!');
        }).catch(() => {
            const range = document.createRange();
            range.selectNode(document.getElementById('cvOutput'));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('CV copied!');
        });
    }

    // ============================================
    // PDF DOWNLOAD (using window.print() - works 100%)
    // ============================================

    function downloadPDF() {
        const content = document.getElementById('cvOutput').textContent;
        if (!content) {
            alert('Generate a CV first!');
            return;
        }

        // Create a temporary container with only the CV content
        const printWindow = window.open('', '_blank', 'width=800,height=600');
        printWindow.document.write(`
            <html>
                <head>
                    <title>CV - ${document.getElementById('fullName').value.trim()}</title>
                    <style>
                        body {
                            font-family: 'Courier New', monospace;
                            padding: 40px;
                            white-space: pre-wrap;
                            font-size: 14px;
                            line-height: 1.8;
                            background: white;
                            color: black;
                        }
                        .cv-content {
                            max-width: 800px;
                            margin: 0 auto;
                        }
                    </style>
                </head>
                <body>
                    <div class="cv-content">${content.replace(/\n/g, '<br>')}</div>
                    <script>
                        window.onload = function() {
                            window.print();
                            setTimeout(function() {
                                window.close();
                            }, 1000);
                        };
                    <\/script>
                </body>
            </html>
        `);
        printWindow.document.close();
    }
</script>
</body>
</html>
