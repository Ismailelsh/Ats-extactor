<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hybrid CV Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            max-width: 850px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #1a2a3a; font-size: 28px; }
        .sub { color: #666; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-top: 16px; margin-bottom: 6px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dce3ec;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-primary {
            background: #2563eb; color: white; border: none;
            padding: 14px; border-radius: 12px; font-size: 18px;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 16px;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success {
            background: #16a34a; color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-success:hover { background: #15803d; }
        .btn-pdf {
            background: #8b5cf6; color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 10px; margin-left: 10px;
        }
        .btn-pdf:hover { background: #7c3aed; }
        .result-box {
            margin-top: 25px; padding: 20px;
            background: #f8fafc; border-radius: 16px;
            border: 2px solid #e2e8f0; display: none;
        }
        .result-box.show { display: block; }
        .flex-buttons {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .cv-output {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #dce3ec;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            margin-top: 10px;
            max-height: 600px;
            overflow-y: auto;
        }
        .cv-output h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .cv-output .section-title {
            font-weight: bold;
            font-size: 16px;
            border-bottom: 2px solid #2563eb;
            padding-bottom: 4px;
            margin-top: 20px;
            color: #1a2a3a;
        }
        .cv-output .hidden-words {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            margin-top: 20px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>📄 Hybrid CV Generator</h1>
    <p class="sub">Fill in your details — we'll generate a professional CV with hidden ATS-friendly keywords.</p>

    <!-- Name -->
    <label>👤 Full Name:</label>
    <input type="text" id="fullName" placeholder="e.g., Ahmed Mohamed" />

    <!-- Email -->
    <label>📧 Email:</label>
    <input type="email" id="email" placeholder="ahmed@example.com" />

    <!-- Phone -->
    <label>📞 Phone:</label>
    <input type="text" id="phone" placeholder="+20 100 000 0000" />

    <!-- Address -->
    <label>📍 Address (optional):</label>
    <input type="text" id="address" placeholder="Cairo, Egypt" />

    <!-- Experience -->
    <label>💼 Experience:</label>
    <textarea id="experience" placeholder="e.g., 5 years as a Software Engineer at Google..."></textarea>

    <!-- Skills -->
    <label>🛠️ Skills (comma separated):</label>
    <input type="text" id="skills" placeholder="e.g., Python, Django, AWS" />

    <!-- Education -->
    <label>🎓 Education:</label>
    <textarea id="education" placeholder="e.g., B.Sc. in Computer Science, Cairo University"></textarea>

    <button class="btn-primary" onclick="generateHybridCV()">🚀 Generate Hybrid CV</button>

    <div id="result" class="result-box">
        <h3>📄 Your Hybrid CV</h3>
        <div id="cvOutput" class="cv-output"></div>
        <div class="flex-buttons">
            <button class="btn-success" onclick="copyCV()">📋 Copy CV</button>
            <button class="btn-pdf" onclick="downloadPDF()">📄 Download as PDF</button>
        </div>
    </div>

</div>

<script>
    function generateHybridCV() {
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const experience = document.getElementById('experience').value.trim();
        const skills = document.getElementById('skills').value.trim();
        const education = document.getElementById('education').value.trim();

        if (!name || !email || !phone || !experience || !skills || !education) {
            alert('⚠️ Please fill in all required fields.');
            return;
        }

        // استخراج الكلمات المفتاحية من الخبرات والمهارات
        const allWords = (experience + ' ' + skills).toLowerCase().match(/[a-z\u0600-\u06FF]+/g) || [];
        const keywordCount = {};
        allWords.forEach(w => {
            if (w.length > 3) keywordCount[w] = (keywordCount[w] || 0) + 1;
        });
        const keywords = Object.keys(keywordCount).sort((a, b) => keywordCount[b] - keywordCount[a]).slice(0, 10);

        // تشفير الكلمات (عكسها)
        const encodedKeywords = keywords.map(w => w.split('').reverse().join(''));

        // بناء الـ CV
        const cv = `
┌─────────────────────────────────────────────────────┐
│                📄 CURRICULUM VITAE                  │
└─────────────────────────────────────────────────────┘

👤 PERSONAL INFORMATION
────────────────────────
Name        : ${name}
Email       : ${email}
Phone       : ${phone}
${address ? `Address     : ${address}` : ''}

💼 PROFESSIONAL EXPERIENCE
────────────────────────
${experience}

🛠️ TECHNICAL SKILLS
────────────────────────
${skills.split(',').map(s => '  • ' + s.trim()).join('\n')}

🎓 EDUCATION
────────────────────────
${education}

💡 HIDDEN KEYWORDS (for ATS only)
────────────────────────
${keywords.map((k, i) => `  • ${k} → ${encodedKeywords[i]}`).join('\n')}

📌 HR Note: This CV is fully readable by humans.
   The hidden words are encoded to help the ATS find matches.
─────────────────────────────────────────────────────
        `;

        document.getElementById('cvOutput').textContent = cv;
        document.getElementById('result').classList.add('show');
    }

    function copyCV() {
        const text = document.getElementById('cvOutput').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ CV copied!');
        }).catch(() => {
            const range = document.createRange();
            range.selectNode(document.getElementById('cvOutput'));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('✅ CV copied!');
        });
    }

    function downloadPDF() {
        const content = document.getElementById('cvOutput').textContent;
        if (!content) {
            alert('⚠️ Generate a CV first!');
            return;
        }

        const element = document.createElement('div');
        element.style.padding = '40px';
        element.style.fontFamily = 'Courier New, monospace';
        element.style.fontSize = '14px';
        element.style.whiteSpace = 'pre-wrap';
        element.style.lineHeight = '1.8';
        element.style.background = 'white';
        element.style.color = 'black';
        element.textContent = content;

        document.body.appendChild(element);

        html2pdf()
            .set({
                margin: 0.5,
                filename: `CV_${document.getElementById('fullName').value.trim().replace(/\s+/g, '_')}.pdf`,
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            })
            .from(element)
            .save()
            .then(() => {
                document.body.removeChild(element);
            })
            .catch(() => {
                document.body.removeChild(element);
                alert('❌ PDF download failed. Please use "Copy CV" instead.');
            });
    }
</script>
</body>
</html>
